<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - My Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()" title="Deschide Meniul">☰</button>
            <h1><span id="nume-casa-global">My Home</span></h1>
        </div>
        <p class="page-subtitle">Panoul tău central de control. Ai acces rapid la starea casei, favorite și notificări.</p>

        <div class="flex-row">
            <div class="widget-card">
                <div><h4 class="widget-title">Vremea Acum</h4><h2 class="widget-value">28°C</h2></div>
                <div class="widget-icon">☀️</div>
            </div>
            <div class="widget-card">
                <div><h4 class="widget-title">Securitate</h4><h2 class="widget-value text-success" id="global-securitate">Armată</h2></div>
                <div class="widget-icon">🛡️</div>
            </div>
            <div class="widget-card">
                <div><h4 class="widget-title">Consum Energetic</h4><h2 class="widget-value text-accent" id="global-consum">0.00 kW</h2></div>
                <div class="widget-icon">⚡</div>
            </div>
        </div>

        <div class="notification-container" id="notifications-container"></div>

        <h2 class="hk-section-title">Scene Favorite</h2>
        <div class="hk-grid-wide" id="fav-scenes-container"></div>

        <h2 class="hk-section-title">Accesorii Favorite</h2>
        <div class="hk-grid" id="fav-accessories-container"></div>
    </main>
    <smart-modal></smart-modal>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
