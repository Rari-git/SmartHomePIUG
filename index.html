<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - My Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h2>SmartHome</h2>
        <a href="index.html" style="color: var(--accent-color); font-weight: bold;">🏠 Home</a>
        <a href="scene.html">🎭 Scene</a>
        <a href="accesorii.html">🛋️ Accesorii</a>
        <a href="harta.html">🗺️ Hartă Casă</a>
        <a href="securitate.html">🛡️ Securitate</a>
        <a href="pericole.html">🚨 Pericole</a>
        <a href="setari.html">⚙️ Setări</a>
    </nav>
    <main>
        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: 25px;">
            <div style="display: flex; align-items: center;">
                <button class="menu-toggle-btn" onclick="toggleNav()" title="Deschide Meniul">☰</button>
                <h1 style="margin: 0;"><span id="nume-casa-global">My Home</span></h1>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <div style="flex: 1; background: var(--card-bg); padding: 15px 20px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between;">
                <div><h4 style="margin: 0; opacity: 0.7;">Vremea Acum</h4><h2 style="margin: 5px 0;">28°C</h2></div>
                <div style="font-size: 2.5em;">☀️</div>
            </div>
            <div style="flex: 1; background: var(--card-bg); padding: 15px 20px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between;">
                <div><h4 style="margin: 0; opacity: 0.7;">Securitate</h4><h2 style="margin: 5px 0; color: var(--success-color);" id="global-securitate">Armată</h2></div>
                <div style="font-size: 2.5em;">🛡️</div>
            </div>
            <div style="flex: 1; background: var(--card-bg); padding: 15px 20px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between;">
                <div><h4 style="margin: 0; opacity: 0.7;">Consum Energetic</h4><h2 style="margin: 5px 0; color: var(--accent-color);" id="global-consum">0.00 kW</h2></div>
                <div style="font-size: 2.5em;">⚡</div>
            </div>
        </div>

        <div class="notification-container" id="notifications-container"></div>

        <h2 class="hk-section-title">Favorite Scenes</h2>
        <div class="hk-grid-wide" id="fav-scenes-container"></div>

        <h2 class="hk-section-title">Favorite Accessories</h2>
        <div class="hk-grid" id="fav-accessories-container"></div>
    </main>

    <div id="popup-dispozitive" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="inchidePopup()">&times;</span>
            <h2 id="modal-titlu" style="margin: 0 0 20px 0; color: var(--accent-color);"></h2>
            <div id="modal-continut"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/counter.js"></script>
</body>
</html>
