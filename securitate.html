<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Securitate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Sistem de Securitate</h1>
        </div>

        <div class="security-grid-container">
            <div class="security-badge-card">
                <div>
                    <h3 class="m-0">Scut de Protecție Global</h3>
                    <div class="flex-row flex-center" style="margin: 20px 0; justify-content: flex-start;">
                        <span id="shield-icon-huge" style="font-size: 4em;">🛡️</span>
                        <div>
                            <h4 class="text-muted m-0" style="text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.5px;">Status Sistem</h4>
                            <h2 class="text-success m-0" id="txt-status-alarma" style="margin-top: 5px;">Sistem Armat</h2>
                        </div>
                    </div>
                </div>
                <div class="flex-row" style="margin: 0; gap: 10px;">
                    <button id="btn-armare-total" class="btn-full" onclick="schimbaStareSecuritate('armat')" style="background: var(--success-color); color: white; flex: 1;">Armează</button>
                    <button id="btn-dezarmare-total" class="btn-full" onclick="schimbaStareSecuritate('dezarmat')" style="background: var(--error-color); color: white; flex: 1;">Dezarmează</button>
                </div>
            </div>

            <div class="security-form-card">
                <h3>Setări Cod Alarmă PIN</h3>
                <div style="display: flex; flex-direction: column; gap: 15px; margin: 15px 0;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: 600; font-size: 0.9em;">Codul de Siguranță Actual</label>
                        <input type="password" id="input-pin-vechi" class="form-input" placeholder="****" maxlength="4" style="text-align: center; letter-spacing: 4px;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: 600; font-size: 0.9em;">Introduceți Codul Nou (4 cifre)</label>
                        <input type="password" id="input-pin-nou" class="form-input" placeholder="****" maxlength="4" style="text-align: center; letter-spacing: 4px;">
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn-full" onclick="salveazaCodPinNou()" style="background: var(--text-color); color: var(--bg-primary);">💾 Actualizează Cod PIN</button>
                    <button class="btn-full" onclick="if(typeof executaSecurizareTotala === 'function') executaSecurizareTotala();" style="background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">⚡ Securizare Rapidă Casă</button>
                </div>
            </div>
        </div>

        <hr style="border: 0; border-top: 2px solid rgba(0,0,0,0.05); margin: 40px 0;">

        <h2 class="hk-section-title"> Echipamente de Supraveghere și Detecție</h2>
        <p class="text-muted mb-20">Monitorizează camerele video live, senzorii de mișcare și statusul geamurilor/ușilor.</p>
        
        <div id="security-devices-container" class="hk-grid"></div>
    </main>
    <smart-modal></smart-modal>
    <script src="js/main.js"></script>
    <script src="js/counter.js"></script>
</body>
</html>
