    <main>
        <h1>Sisteme de Securitate</h1>
        <div class="form-group">
            <h3>Dezactivare Sistem Alarmă</h3>
            <label for="pinInput">Introdu codul PIN (4 cifre):</label>
            <input type="password" id="pinInput" placeholder="****" maxlength="4">
            <button onclick="valideazaPIN()">Dezactivează Alarmă</button>
            <p id="pinError" class="error-msg">❌ Eroare: PIN-ul trebuie să conțină exact 4 cifre!</p>
            <p id="pinSuccess" class="success-msg">✅ Sistemul a fost dezactivat!</p>
        </div>
    </main>
