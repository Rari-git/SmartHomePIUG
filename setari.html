<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Setări Generale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Setări Sistem</h1>
        </div>

        <div class="settings-card">
            <h3>Personalizare Casă</h3>
            <div class="form-row">
                <label for="nume-casa-input">Numele Locuinței tale</label>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <input type="text" id="nume-casa-input" class="form-input" placeholder="Ex: My Home, Apartament Smart">
                    <button onclick="salveazaNumeCasa()" style="background: var(--accent-color); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">Salvează</button>
                </div>
            </div>
        </div>

        <div class="settings-card">
            <h3>Setări Cod Alarmă PIN</h3>
            <div style="display: flex; flex-direction: column; gap: 15px; margin: 15px 0;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 600; font-size: 0.9em;">Codul de Siguranță Actual</label>
                    <input type="password" id="input-pin-vechi" class="form-input" placeholder="****" maxlength="4" style="text-align: center; letter-spacing: 4px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 600; font-size: 0.9em;">Introduceți Codul Nou (4 cifre)</label>
                    <input type="password" id="input-pin-nou" class="form-input" placeholder="****" maxlength="4" style="text-align: center; letter-spacing: 4px;">
                </div>
            </div>
            <button onclick="salveazaCodPinNou()" style="background: var(--text-color); color: var(--bg-primary); padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%;">💾 Actualizează Cod PIN</button>
        </div>

        <div class="settings-card">
            <h3>Preferințe Afișaj & Interfață</h3>
            <div class="flex-between" style="padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05);">
                <div>
                    <h4 class="m-0" style="font-size: 1.1em;">Mod Întunecat (Dark Mode)</h4>
                    <p class="text-muted m-0" style="margin-top: 4px; font-size: 0.85em;">Schimbă aspectul aplicației pentru utilizare pe timp de noapte.</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="dark-mode-toggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>

            <div style="margin-top: 25px;">
                <h4 class="m-0" style="font-size: 1.1em; margin-bottom: 10px;">Culoare Accent Sistem (Brand Color)</h4>
                <div style="display: flex; gap: 15px; margin-top: 12px;">
                    <div onclick="schimbaCuloareAccent('#007aff')" style="width:35px; height:35px; border-radius:50%; background:#007aff; cursor:pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                    <div onclick="schimbaCuloareAccent('#ff9500')" style="width:35px; height:35px; border-radius:50%; background:#ff9500; cursor:pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                    <div onclick="schimbaCuloareAccent('#ff3b30')" style="width:35px; height:35px; border-radius:50%; background:#ff3b30; cursor:pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                    <div onclick="schimbaCuloareAccent('#2ecc71')" style="width:35px; height:35px; border-radius:50%; background:#2ecc71; cursor:pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                    <div onclick="schimbaCuloareAccent('#9b59b6')" style="width:35px; height:35px; border-radius:50%; background:#9b59b6; cursor:pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = localStorage.getItem('darkMode') === 'true';
            document.getElementById('dark-mode-toggle').checked = isDark;

            const numeSalvat = localStorage.getItem('numeCasaSalvat') || "My Home";
            document.getElementById('nume-casa-input').value = numeSalvat;
        });

        function salveazaNumeCasa() {
            const inputVal = document.getElementById('nume-casa-input').value.trim();
            if (inputVal === "") {
                if (typeof showToast === 'function') showToast("Te rog introdu un nume valid!");
                return;
            }
            localStorage.setItem('numeCasaSalvat', inputVal);
            const globalElem = document.getElementById('nume-casa-global');
            if (globalElem) globalElem.innerText = inputVal;
            if (typeof showToast === 'function') showToast("Numele locuinței a fost salvat cu succes.");
        }
    </script>
</body>
</html>
