<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Statistici & Istoric</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Statistici & Jurnal Activități</h1>
        </div>
        
        <div class="stats-card">
            <h3 class="m-0 text-accent mb-20">Jurnal de Securitate și Evenimente</h3>
            <div id="log-evenimente-container" style="display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </main>

    <div id="popup-istoric" class="history-modal" onclick="if(event.target === this) inchidePopupIstoric()">
        <div class="history-modal-content">
            <div class="flex-between mb-20">
                <h2 id="istoric-titlu" class="m-0"> Jurnal Istoric Casă</h2>
                <button onclick="inchidePopupIstoric()" style="background: transparent; border: none; font-size: 1.5em; cursor: pointer; color: inherit; opacity: 0.5;">&times;</button>
            </div>
            
            <div class="time-filters">
                <button id="btn-period-7z" class="filter-btn active" onclick="schimbaPerioadaIstoric('7z')">7 Zile</button>
                <button id="btn-period-30z" class="filter-btn" onclick="schimbaPerioadaIstoric('30z')">30 Zile</button>
                <button id="btn-period-6l" class="filter-btn" onclick="schimbaPerioadaIstoric('6l')">6 Luni</button>
                <button id="btn-period-1an" class="filter-btn" onclick="schimbaPerioadaIstoric('1an')">1 An</button>
            </div>
            
            <div id="istoric-grafic-content" style="min-height: 200px; display: flex; align-items: center; justify-content: center; font-style: italic; opacity: 0.7;">
                Se încarcă datele istorice agregate...
            </div>
        </div>
    </div>
    <smart-modal></smart-modal>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
