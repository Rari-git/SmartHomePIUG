<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Încărcare SmartHome...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1c1c1e; /* Fundal închis elegant */
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag; /* Poate fi mutată fereastra cu mouse-ul */
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }
        
        .logo-container {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            font-size: 1.2em;
            animation: pulse 2s infinite ease-in-out;
            color: #007aff; /* Culoarea de accent (albastru) */
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            margin-top: 25px;
            font-size: 0.8em;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px rgba(0, 122, 255, 0.5)); }
            50% { transform: scale(1.05); opacity: 0.8; filter: drop-shadow(0 0 0px rgba(0, 122, 255, 0)); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px rgba(0, 122, 255, 0.5)); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <span class="icon">🏠</span>
        <span>SmartHome</span>
    </div>
    <div class="spinner"></div>
    <div class="loading-text">Se inițializează sistemele...</div>
</body>
</html>
