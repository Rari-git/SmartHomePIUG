<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Pericole & Alerte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Senzori de Risc & Pericole</h1>
        </div>

        <div class="danger-panel status-safe" id="panel-inundatie">
            <span class="danger-icon">💧</span>
            <h2>Senzor Inundație (Baie)</h2>
            <p id="status-inundatie" class="text-success" style="font-weight: bold; font-size: 1.1em;">Stare Normală</p>
            <div id="controls-inundatie" style="margin-top: 20px;">
                <button type="button" class="btn-simulate" onclick="declanseazaAlarma('inundatie')">Simulează Inundație</button>
            </div>
        </div>

        <div class="danger-panel status-safe" id="panel-incendiu">
            <span class="danger-icon">🔥</span>
            <h2>Detector de Fum & Gaz (Bucătărie)</h2>
            <p id="status-incendiu" class="text-success" style="font-weight: bold; font-size: 1.1em;">Aer Curat</p>
            <div id="controls-incendiu" style="margin-top: 20px;">
                <button type="button" class="btn-simulate" onclick="declanseazaAlarma('incendiu')">Simulează Detecție Fum</button>
            </div>
        </div>
    </main>
    <smart-modal></smart-modal>
    <script src="js/main.js"></script>
    <script src="js/counter.js"></script>
    <script>
        function declanseazaAlarma(tip) {
            const panel = document.getElementById(`panel-${tip}`);
            const status = document.getElementById(`status-${tip}`);
            const controls = document.getElementById(`controls-${tip}`);

            panel.classList.remove('status-safe');

            if (tip === 'inundatie') {
                panel.classList.add('status-alert-water');
                status.innerText = "🚨 ALERTA: APĂ DETECTATĂ PE PARCHET!"; status.style.color = "#2980b9";
                controls.innerHTML = `<button type="button" class="btn-stop" onclick="opresteAlarma('inundatie')">Oprește Alarma și Robinetul</button>`;
                if (typeof adaugaInLog === 'function') adaugaInLog("⚠️ ALERTĂ CRITICĂ: Senzorul de inundatie a detectat scurgeri în Baie!");
            } else if (tip === 'incendiu') {
                panel.classList.add('status-alert-fire');
                status.innerText = "🚨 ALERTĂ: FUM DETECTAT (PERICOL)!"; status.style.color = "#e74c3c";
                controls.innerHTML = `<button type="button" class="btn-stop" onclick="opresteAlarma('incendiu')">Oprește Alarma și Gazul</button>`;
                if (typeof adaugaInLog === 'function') adaugaInLog("⚠️ ALERTĂ CRITICĂ: Senzorul a detectat FUM sau FOC în Bucătărie!");
            }
        }

        function opresteAlarma(tip) {
            const panel = document.getElementById(`panel-${tip}`);
            const status = document.getElementById(`status-${tip}`);
            const controls = document.getElementById(`controls-${tip}`);

            panel.classList.remove('status-alert-water', 'status-alert-fire');
            panel.classList.add('status-safe');

            if (tip === 'inundatie') {
                status.innerText = "Stare Normală"; status.style.color = "var(--success-color)";
                controls.innerHTML = `<button type="button" class="btn-simulate" onclick="declanseazaAlarma('inundatie')">Simulează Inundație</button>`;
            } else if (tip === 'incendiu') {
                status.innerText = "Aer Curat"; status.style.color = "var(--success-color)";
                controls.innerHTML = `<button type="button" class="btn-simulate" onclick="declanseazaAlarma('incendiu')">Simulează Detecție Fum</button>`;
            }
            if (typeof showToast === 'function') showToast("Alarma a fost oprită manual de utilizator.");
        }
    </script>
</body>
</html>
