<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>SmartHome - Pericole & Alerte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/components.js"></script>
</head>

<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Senzori de Risc & Pericole</h1>
        </div>

        <div class="danger-panel status-safe" id="panel-inundatie">
            <span class="danger-icon">💧</span>
            <h2>Senzor Inundație (Baie)</h2>
            <p id="status-inundatie" class="text-success" style="font-weight: bold; font-size: 1.1em;">Stare Normală</p>
            <div id="controls-inundatie" style="margin-top: 20px; display: flex; justify-content: center;">
                <button type="button" class="btn-simulate" onclick="simuleazaInundatie()">Simulează Inundație</button>
                <button type="button" class="btn-stop" onclick="reseteazaInundatie()" style="display: none;">Oprește
                    Alarma și Robinetul</button>
            </div>
        </div>

        <div class="danger-panel status-safe" id="panel-incendiu">
            <span class="danger-icon">🔥</span>
            <h2>Detector de Fum & Gaz (Bucătărie)</h2>
            <p id="status-incendiu" class="text-success" style="font-weight: bold; font-size: 1.1em;">Stare Normală</p>
            <div id="controls-incendiu" style="margin-top: 20px; display: flex; justify-content: center;">
                <button type="button" class="btn-simulate" onclick="simuleazaIncendiu()">Simulează Detecție Fum</button>
                <button type="button" class="btn-stop" onclick="reseteazaIncendiu()" style="display: none;">Oprește
                    Alarma și Gazul</button>
            </div>
        </div>
    </main>
    <smart-modal></smart-modal>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/validation.js"></script>
    <script type="module">
        import { simuleazaInundatie, reseteazaInundatie, simuleazaIncendiu, reseteazaIncendiu } from '../js/validation.js';

        // Atașăm evenimentele dinamic și sigur la nivel de DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Mapare butoane Inundație
            const btnSimInundatie = document.querySelector('#panel-inundatie .btn-simulate');
            const btnStopInundatie = document.querySelector('#panel-inundatie .btn-stop');
            if (btnSimInundatie) btnSimInundatie.addEventListener('click', () => simuleazaInundatie(true));
            if (btnStopInundatie) btnStopInundatie.addEventListener('click', () => reseteazaInundatie());

            // Mapare butoane Incendiu
            const btnSimIncendiu = document.querySelector('#panel-incendiu .btn-simulate');
            const btnStopIncendiu = document.querySelector('#panel-incendiu .btn-stop');
            if (btnSimIncendiu) btnSimIncendiu.addEventListener('click', () => simuleazaIncendiu(true));
            if (btnStopIncendiu) btnStopIncendiu.addEventListener('click', () => reseteazaIncendiu());

            // Verificare stare persistentă la încărcare pagină
            if (localStorage.getItem('pericolInundatie') === 'true') {
                simuleazaInundatie(false);
            }
            if (localStorage.getItem('pericolIncendiu') === 'true') {
                simuleazaIncendiu(false);
            }
        });
    </script>
</body>

</html>
