<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>SmartHome - Accesorii</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/components.js"></script>
</head>

<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Toate Accesoriile</h1>
        </div>
        <p>Apasă pe un obiect pentru a-l opri/porni. Apasă steluța (★) pentru a-l fixa pe pagina Home. Apasă (⚙️) pentru
            volum/intensitate/stergere din sistem.</p>
        <div id="all-accessories-container"></div>

        <h2 class="hk-section-title" style="margin-top: 30px;">Adaugare accesoriu nou</h2>
        <div class="hk-grid">
            <div class="hk-card card-add-new" onclick="deschideModalAdaugareAccesoriu()">
                <div class="plus-icon"><i class="ph-bold ph-plus"></i></div>
                <div class="add-title">Adaugă Accesoriu</div>
                <div class="add-desc">Adaugă un dispozitiv nou</div>
            </div>
        </div>
    </main>

    <!-- Modal Adaugare Accesoriu -->
    <div id="popup-adaugare-accesoriu" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="inchideModalAdaugareAccesoriu()">&times;</span>
            <h2 style="margin-top: 0; color: var(--accent-color);"><i class="ph-bold ph-plus-circle"></i> Adăugare
                Accesoriu Nou</h2>
            <div class="form-row">
                <label>Nume Accesoriu:</label>
                <input type="text" id="new-acc-name" class="form-input" placeholder="ex: Lampă Birou">
            </div>
            <div class="form-row">
                <label>Categorie (Tip Dispozitiv):</label>
                <select id="new-acc-category" class="form-input">
                    <option value="becuri">Becuri</option>
                    <option value="luminiRGB">Lumini RGB</option>
                    <option value="prize">Prize Inteligente</option>
                    <option value="electrocasnice">Electrocasnice</option>
                    <option value="audio">Sisteme Audio</option>
                    <option value="tv">TV</option>
                    <option value="senzoriContact">Senzori Contact (Uși/Ferestre)</option>
                    <option value="senzoriMiscare">Senzori Mișcare</option>
                    <option value="jaluzele">Jaluzele / Draperii</option>
                </select>
            </div>
            <div class="form-row">
                <label>Cameră:</label>
                <select id="new-acc-room" class="form-input">
                    <option value="Living">Living</option>
                    <option value="Dormitor">Dormitor</option>
                    <option value="Bucătărie">Bucătărie</option>
                    <option value="Baie">Baie</option>
                    <option value="Hol">Hol</option>
                    <option value="Exterior">Exterior</option>
                </select>
            </div>
            <button onclick="salveazaAccesoriuNou()" class="btn-full-success" style="margin-top: 15px;">💾 Salvează
                Accesoriul</button>
        </div>
    </div>

    <smart-modal></smart-modal>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>

</html>
