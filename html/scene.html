<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Scene</h1>
        </div>
        <p class="page-subtitle">Alege o scenă sau configurează-ți propriile scene personalizate pentru casa ta inteligentă.</p>
        
        <div class="hk-grid-wide mb-20" id="all-scenes-container"></div>

        <h2 class="hk-section-title">Scene Personalizate</h2>
        <div class="card-add-custom-scene" onclick="deschidePopupCreareScena()">
            <div class="plus-icon"><i class="ph-bold ph-plus"></i></div>
            <div class="scene-title">Crează Scenă Personalizată</div>
            <div class="scene-desc">Configurare complet manuală</div>
        </div>
    </main>
    <smart-modal></smart-modal>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
