<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Hartă Casă</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Planul Casei 2D</h1>
        </div>
        <p>Apasă pe oricare indicator de pe schiță pentru a gestiona direct dispozitivul din camera respectivă.</p>

        <div class="map-wrapper">
            <img src="Home.svg" class="blueprint-image" alt="Plan Casa">
            <div class="map-hotspot" style="top: 25%; left: 22%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 0)" title="Lumină Dormitor">💡</div>
            <div class="map-hotspot" style="top: 20%; left: 35%;" onclick="deschideMeniuDispozitive('cat_jaluzele', 'jaluzele', 0)" title="Draperie Dormitor">🪟</div>
            <div class="map-hotspot" style="top: 25%; left: 70%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 1)" title="Lumină Baie">💡</div>
            <div class="map-hotspot" style="top: 55%; left: 22%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 2)" title="Lumină Bucătărie">💡</div>
            <div class="map-hotspot" style="top: 48%; left: 40%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 4)" title="Senzor Inundație">💧</div>
            <div class="map-hotspot" style="top: 78%; left: 48%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 3)" title="Lumină Principală Living">💡</div>
            <div class="map-hotspot" style="top: 86%; left: 75%;" onclick="deschideMeniuDispozitive('cat_lumini', 'becuri', 5)" title="Lampă Ambientă Living">💡</div>
            <div class="map-hotspot" style="top: 94%; left: 48%;" onclick="deschideMeniuDispozitive('cat_jaluzele', 'jaluzele', 1)" title="Fereastră Living">🪟</div>
            <div class="map-hotspot" style="top: 94%; left: 24%;" onclick="deschideMeniuDispozitive('cat_senzoriContact', 'senzoriContact', 1)" title="Fereastră 1 Living">🟩</div>
            <div class="map-hotspot" style="top: 74%; left: 96%;" onclick="deschideMeniuDispozitive('cat_senzoriContact', 'senzoriContact', 2)" title="Fereastră 2 Living">🟩</div>
            <div class="map-hotspot" style="top: 79%; left: -2.7%; border-color: var(--accent-color);" onclick="deschideMeniuDispozitive('cat_incuietori', 'incuietori', 0)" title="Ușă Principală">🚪</div>
            <div class="map-hotspot" style="top: 72%; left: -5%;" onclick="deschideMeniuDispozitive('cat_camereVideo', 'camereVideo', 0)" title="Interfon Video">📹</div>
            <div class="map-hotspot" style="top: 95%; left: -3%;" onclick="deschideMeniuDispozitive('cat_camereVideo', 'camereVideo', 1)" title="Cameră Curte">📹</div>
        </div>
    </main>
    <smart-modal></smart-modal>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
