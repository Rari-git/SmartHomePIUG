<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Hartă Casă</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 650px; /* Dimensiune optimă și proporțională cu restul site-ului */
            margin: 30px auto 0 auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow: visible;
        }

        .blueprint-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            transition: filter 0.3s ease;
        }

        /* --- Magia pentru Dark Mode --- */
        /* Inversează culorile imaginii SVG (albul devine negru, negrul devine alb) */
        body.dark-mode .blueprint-image {
            filter: invert(1) brightness(0.9) contrast(1.1);
        }

        /* Punctele interactive (Hotspots) */
        .map-hotspot {
            position: absolute;
            width: 38px;
            height: 38px;
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.2s, color 0.2s;
            user-select: none;
            z-index: 100;
        }

        .map-hotspot:hover {
            transform: scale(1.2);
            background-color: var(--accent-color);
            color: white !important;
        }
    </style>
</head>
<body>
    <nav>
        <h2>SmartHome</h2>
        <a href="index.html">🏠 Home</a>
        <a href="camere.html">🛋️ Camere</a>
        <a href="harta.html" style="color: var(--accent-color); font-weight: bold;">🗺️ Hartă Casă</a>
        <a href="securitate.html">🛡️ Securitate</a>
        <a href="pericole.html">🚨 Pericole</a>
        <a href="setari.html">⚙️ Setări</a>
    </nav>
    <main>
        <h1>Planul Interactiv al Casei (Floor Plan)</h1>
        <p>Gestionare vizuală a dispozitivelor inteligente. Faceți click pe pictogramele din camere pentru control instant.</p>
        
        <div class="map-wrapper">
            
            <img src="Home.svg" alt="Schița Casei" class="blueprint-image">
            
            <div class="map-hotspot" style="top: 25%; left: 30%;" onclick="deschideMeniuDispozitive('cat_becuri', 'becuri')" title="Lumini Dormitor">💡</div>
            <div class="map-hotspot" style="top: 2%; left: 31%;" onclick="deschideMeniuDispozitive('cat_jaluzele', 'jaluzele')" title="Jaluzele Dormitor">🪟</div>

            <div class="map-hotspot" style="top: 62%; left: 15%;" onclick="deschideMeniuDispozitive('cat_becuri', 'becuri')" title="Lumini Baie">💡</div>
            <div class="map-hotspot" style="top: 60%; left: 30%;" onclick="deschideMeniuDispozitive('cat_audio', 'audio')" title="Audio Baie">🎵</div>

            <div class="map-hotspot" style="top: 86%; left: 22%;" onclick="deschideMeniuDispozitive('cat_becuri', 'becuri')" title="Lumini Bucătărie">💡</div>
            <div class="map-hotspot" style="top: 80%; left: 46%;" onclick="deschideMeniuDispozitive('cat_prize', 'prize')" title="Prize Bucătărie">🔌</div>

            <div class="map-hotspot" style="top: 6%; left: 76%;" onclick="deschideMeniuDispozitive('cat_tv', 'tv')" title="Televizor Living">📺</div>
            <div class="map-hotspot" style="top: 32%; left: 83%;" onclick="deschideMeniuDispozitive('cat_becuri', 'becuri')" title="Lumini Living">💡</div>
            <div class="map-hotspot" style="top: 15%; left: 87%;" onclick="deschideMeniuDispozitive('cat_audio', 'audio')" title="Audio Living">🎵</div>
            <div class="map-hotspot" style="top: 90%; left: 70%;" onclick="deschideMeniuDispozitive('cat_aspirator', 'aspirator')" title="Aspirator Robot">🤖</div>

            <div class="map-hotspot" style="top: 86%; left: 63%; border-color: var(--error-color);" onclick="deschideMeniuDispozitive('cat_incuietori', 'incuietori')" title="Ușă Intrare">🚪</div>

        </div>
    </main>

    <div id="popup-dispozitive" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="inchidePopup()">&times;</span>
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 0; margin-bottom: 20px;">
                <h2 id="modal-titlu" style="margin: 0; color: var(--accent-color);"></h2>
                <span id="modal-star" class="modal-star-icon" title="Adaugă la Acces Rapid"></span>
            </div>
            <div id="modal-continut"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/counter.js"></script>
</body>
</html>
