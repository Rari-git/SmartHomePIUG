<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Automatizări</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js"></script>
</head>
<body>
    <smart-nav></smart-nav>
    <main>
        <div class="page-header">
            <button class="menu-toggle-btn" onclick="toggleNav()">☰</button>
            <h1>Reguli de Automatizare</h1>
        </div>
        <div id="automation-list-container"></div>
    </main>
    <smart-modal></smart-modal>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        let modTriggerCurent = 'disp';
        function schimbaTabTrigger(mod) {
            modTriggerCurent = mod;
            document.getElementById('tab-disp').classList.toggle('active', mod === 'disp');
            document.getElementById('tab-timp').classList.toggle('active', mod === 'timp');
            document.getElementById('trigger-disp-container').style.display = mod === 'disp' ? 'block' : 'none';
            document.getElementById('trigger-timp-container').style.display = mod === 'timp' ? 'block' : 'none';
        }
        function scrollCarousel(dir) {
            const container = document.getElementById('sabloane-carousel');
            if (container) container.scrollBy({ left: dir * 280, behavior: 'smooth' });
        }
    </script>
</body>
</html>
